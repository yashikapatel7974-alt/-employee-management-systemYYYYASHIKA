version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: enterprise-ems-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterprise_ems
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  backend:
    build: ./backend
    container_name: enterprise-ems-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=enterprise_ems
      - DB_PORT=5432
      - JWT_SECRET=super_secure_production_secret
      - JWT_EXPIRES_IN=1h
      - JWT_REFRESH_SECRET=super_secure_production_refresh_secret
      - JWT_REFRESH_EXPIRES_IN=7d
      - SMTP_HOST=smtp.mailtrap.io
      - SMTP_PORT=2525
      - SMTP_USER=test
      - SMTP_PASS=test
    depends_on:
      - db
    restart: always

  frontend:
    build: ./frontend
    container_name: enterprise-ems-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
